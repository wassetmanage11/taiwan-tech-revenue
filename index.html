<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=5.0,user-scalable=yes">
<title>Taiwan Tech Revenue Dashboard</title>
<style>
:root{--bg:#06060e;--s1:#0d0d1a;--s2:#141428;--bd:#28284a;--tx:#e8e8f4;--dim:#6a6a9a;--a1:#00e6b8;--a2:#3d8bfd;--a3:#ff5c5c;--a4:#ffbe2e;--a5:#a855f7;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);color:var(--tx);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Apple SD Gothic Neo',sans-serif;-webkit-font-smoothing:antialiased;line-height:1.45;}
.app{max-width:1600px;margin:0 auto;padding:14px 10px 80px;}
header{display:flex;align-items:center;gap:10px;padding:8px 2px 14px;border-bottom:1px solid var(--bd);margin-bottom:12px;}
.logo{width:38px;height:38px;background:linear-gradient(135deg,var(--a1),var(--a2));border-radius:10px;display:grid;place-items:center;font-size:18px;flex-shrink:0;}
header h1{font-size:17px;font-weight:800;letter-spacing:-.3px;}
header h1 em{color:var(--a1);font-style:normal;}
.sub{color:var(--dim);font-size:10px;font-family:monospace;}

.ctrl{position:sticky;top:0;z-index:20;background:var(--bg);padding:8px 0 10px;border-bottom:1px solid var(--bd);}
.row{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:7px;}
.row:last-child{margin-bottom:0;}
.pill{padding:6px 12px;border-radius:7px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid var(--bd);background:var(--s1);color:var(--dim);white-space:nowrap;transition:.15s;user-select:none;-webkit-user-select:none;}
.pill.on{color:#000;border-color:var(--a1);background:var(--a1);}
.pill.cur{border-color:var(--a4);color:var(--a4);}
.pill.cur.on{background:var(--a4);color:#000;border-color:var(--a4);}
.search{flex:1;min-width:140px;max-width:280px;padding:7px 11px;border-radius:7px;border:1px solid var(--bd);background:var(--s1);color:var(--tx);font-size:13px;font-family:inherit;outline:none;}
.search:focus{border-color:var(--a1);}
.cats-wrap{display:flex;gap:5px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;padding-bottom:2px;}
.cats-wrap::-webkit-scrollbar{display:none;}

.cnt{font-size:10px;color:var(--dim);margin:10px 0 6px 2px;}
.grid{display:grid;grid-template-columns:1fr;gap:12px;}
@media(min-width:640px){.grid{grid-template-columns:1fr 1fr;}}
@media(min-width:1080px){.grid{grid-template-columns:1fr 1fr 1fr;}}

.card{background:var(--s1);border:1px solid var(--bd);border-radius:12px;padding:14px;overflow:hidden;}
.card:hover{border-color:var(--a2);}
.card-hd{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:2px;}
.card-hd h3{font-size:12px;font-weight:700;}
.cat-tag{font-size:8px;padding:2px 5px;border-radius:3px;background:var(--s2);color:var(--dim);white-space:nowrap;flex-shrink:0;}
.metrics{display:flex;gap:10px;margin-bottom:8px;flex-wrap:wrap;align-items:baseline;}
.metric .val{font-size:14px;font-weight:800;font-family:monospace;letter-spacing:-.3px;}
.metric .lbl{font-size:8px;color:var(--dim);}
.metric .chg{font-size:10px;font-weight:700;}
.up{color:var(--a1);}.dn{color:var(--a3);}
.ch-wrap{height:190px;position:relative;}
@media(min-width:640px){.ch-wrap{height:210px;}}
.ch-wrap canvas{display:block;width:100%!important;height:100%!important;}
.yr-lbl{font-size:9px;font-weight:600;color:var(--dim);margin-top:8px;padding-top:6px;border-top:1px solid var(--bd);}
.yr-wrap{height:140px;position:relative;}
.yr-wrap canvas{display:block;width:100%!important;height:100%!important;}
.no-data{text-align:center;padding:50px 10px;color:var(--dim);font-size:13px;}
.load-msg{text-align:center;padding:60px 20px;color:var(--dim);font-size:14px;}
</style>
</head>
<body>
<div class="app">
<header>
<div class="logo">TW</div>
<div>
<h1>Taiwan <em>Tech</em> Revenue</h1>
<div class="sub">Monthly Dashboard &middot; 2021-2026 &middot; 35 Companies &middot; Updated ~26/02</div>
</div>
</header>

<div class="ctrl">
<div class="row">
<input class="search" id="q" placeholder="Search company..." oninput="dr()">
<div class="pill cur on" data-cur="ntd" onclick="setCur('ntd')">NT$</div>
<div class="pill cur" data-cur="usd" onclick="setCur('usd')">USD</div>
<div class="pill cur" data-cur="krw" onclick="setCur('krw')">KRW</div>
</div>
<div class="cats-wrap" id="catBtns"></div>
</div>

<div class="cnt" id="cnt"></div>
<div class="grid" id="grid"><div class="load-msg">Loading Chart.js...</div></div>
</div>

var D=BLOB.data, CATS=BLOB.cats, FX=BLOB.fx;
var CO_CAT={};
Object.keys(CATS).forEach(function(cat){CATS[cat].forEach(function(c){CO_CAT[c]=cat;});});

var activeCat='All',currency='ntd',charts={},debT=null;
var BAR_COLORS=['#1e88e5','#26c6da','#66bb6a','#ffa726','#ef5350','#ab47bc','#42a5f5','#29b6f6','#9ccc65','#ffca28','#ec407a','#7e57c2'];
var YR_CL={'21':'#5c6bc0','22':'#42a5f5','23':'#ab47bc','24':'#ffa726','25':'#26c6da','26':'#ef5350'};

function setCur(c){
  currency=c;
  document.querySelectorAll('[data-cur]').forEach(function(e){e.className='pill cur'+(e.dataset.cur===c?' on':'');});
  render();
}
function dr(){clearTimeout(debT);debT=setTimeout(render,200);}

function init(){
  var cb=document.getElementById('catBtns');
  ['All'].concat(Object.keys(CATS)).forEach(function(c){
    var b=document.createElement('div');
    b.className='pill'+(c==='All'?' on':'');
    b.textContent=c;b.setAttribute('data-cat',c);
    b.onclick=function(){
      activeCat=c;
      document.querySelectorAll('[data-cat]').forEach(function(e){e.className='pill'+(e.getAttribute('data-cat')===c?' on':'');});
      render();
    };
    cb.appendChild(b);
  });
  render();
}

function cv(ntd,p){
  if(ntd==null) return null;
  if(currency==='ntd') return ntd;
  var tu=FX.twd_usd[p]||32, uk=FX.usd_krw[p]||1400;
  if(currency==='usd') return ntd/tu;
  return ntd/tu*uk;
}

function fc(v){
  if(v==null) return '-';
  var a=Math.abs(v);
  if(currency==='ntd'){
    if(a>=1e6) return 'NT$'+(v/1e6).toFixed(1)+'T';
    if(a>=1e3) return 'NT$'+(v/1e3).toFixed(1)+'B';
    if(a>=1) return 'NT$'+v.toFixed(0)+'M';
    return 'NT$'+(v*1e3).toFixed(0)+'K';
  }
  if(currency==='usd'){
    if(a>=1e3) return '$'+(v/1e3).toFixed(1)+'B';
    if(a>=1) return '$'+v.toFixed(0)+'M';
    return '$'+(v*1e3).toFixed(0)+'K';
  }
  var eok=v/100;
  if(Math.abs(eok)>=1e4) return (eok/1e4).toFixed(2)+'jo';
  if(Math.abs(eok)>=10) return Math.round(eok).toLocaleString()+'B won';
  if(Math.abs(eok)>=1) return eok.toFixed(1)+'B won';
  return v.toFixed(0)+'M won';
}
function fa(v){
  var a=Math.abs(v);
  if(currency==='ntd'){
    if(a>=1e6) return (v/1e6).toFixed(0)+'T';
    if(a>=1e3) return (v/1e3).toFixed(1)+'B';
    if(a>=1) return v.toFixed(0)+'M';
    return (v*1e3).toFixed(0)+'K';
  }
  if(currency==='usd'){
    if(a>=1e3) return (v/1e3).toFixed(1)+'B';
    if(a>=1) return v.toFixed(0)+'M';
    return (v*1e3).toFixed(0)+'K';
  }
  var eok=v/100;
  if(Math.abs(eok)>=1e4) return (eok/1e4).toFixed(1)+'jo';
  if(Math.abs(eok)>=1) return Math.round(eok)+'B';
  return v.toFixed(0);
}

function render(){
  if(!chartLoaded) return;
  var grid=document.getElementById('grid');
  var q=document.getElementById('q').value.toLowerCase();
  Object.keys(charts).forEach(function(k){try{charts[k].destroy();}catch(e){}});
  charts={};

  var names=Object.keys(D);
  if(activeCat!=='All'&&CATS[activeCat]) names=CATS[activeCat].filter(function(n){return D[n];});
  if(q) names=Object.keys(D).filter(function(n){return n.toLowerCase().indexOf(q)!==-1||(CO_CAT[n]||'').toLowerCase().indexOf(q)!==-1;});

  document.getElementById('cnt').textContent=names.length+' companies';
  if(!names.length){grid.innerHTML='<div class="no-data">No results</div>';return;}

  var html='';
  names.forEach(function(name,ni){
    var d=D[name]; if(!d) return;
    var cat=CO_CAT[name]||'Other';
    var vr=d.r.filter(function(x){return x!=null;});
    var lastIdx=-1;
    for(var i=d.r.length-1;i>=0;i--){if(d.r[i]!=null){lastIdx=i;break;}}
    var lastR=lastIdx>=0?d.r[lastIdx]:null;
    var lastP=lastIdx>=0?d.p[lastIdx]:d.p[d.p.length-1];
    var lastConv=cv(lastR,lastP);
    var lastM=null,lastY=null;
    for(var i=d.mom.length-1;i>=0;i--){if(d.mom[i]!=null){lastM=d.mom[i];break;}}
    for(var i=d.yoy.length-1;i>=0;i--){if(d.yoy[i]!=null&&d.yoy[i]>-99){lastY=d.yoy[i];break;}}
    html+='<div class="card"><div class="card-hd"><h3>'+name+'</h3><div class="cat-tag">'+cat+'</div></div>';
    html+='<div class="metrics">';
    html+='<div class="metric"><div class="val">'+fc(lastConv)+'</div><div class="lbl">'+lastP+' Revenue</div></div>';
    if(lastM!=null) html+='<div class="metric"><div class="chg '+(lastM>=0?'up':'dn')+'">'+(lastM>=0?'+':'')+lastM.toFixed(1)+'%</div><div class="lbl">MoM</div></div>';
    if(lastY!=null) html+='<div class="metric"><div class="chg '+(lastY>=0?'up':'dn')+'">'+(lastY>=0?'+':'')+lastY.toFixed(1)+'%</div><div class="lbl">YoY</div></div>';
    html+='</div>';
    html+='<div class="ch-wrap"><canvas id="ch'+ni+'"></canvas></div>';
    html+='<div class="yr-lbl">YoY by Year</div>';
    html+='<div class="yr-wrap"><canvas id="yr'+ni+'"></canvas></div>';
    html+='</div>';
  });
  grid.innerHTML=html;

  if('IntersectionObserver' in window){
    var obs=new IntersectionObserver(function(entries){
      entries.forEach(function(entry){
        if(entry.isIntersecting){
          var el=entry.target;
          var idx=parseInt(el.getAttribute('data-idx'));
          var nm=el.getAttribute('data-nm');
          var tp=el.getAttribute('data-tp');
          if(!charts[el.id]){
            if(tp==='main') mkMain(el.id,D[nm],idx);
            else mkYr(el.id,D[nm],idx);
          }
          obs.unobserve(el);
        }
      });
    },{rootMargin:'300px'});

    names.forEach(function(name,ni){
      var c1=document.getElementById('ch'+ni);
      var c2=document.getElementById('yr'+ni);
      if(c1){c1.setAttribute('data-idx',ni);c1.setAttribute('data-nm',name);c1.setAttribute('data-tp','main');obs.observe(c1);}
      if(c2){c2.setAttribute('data-idx',ni);c2.setAttribute('data-nm',name);c2.setAttribute('data-tp','yr');obs.observe(c2);}
    });
  } else {
    names.forEach(function(name,ni){
      mkMain('ch'+ni,D[name],ni);
      mkYr('yr'+ni,D[name],ni);
    });
  }
}

function mkMain(id,d,idx){
  var el=document.getElementById(id);
  if(!el||!d) return;
  var barClr=BAR_COLORS[idx%BAR_COLORS.length];
  var labs=[],bd=[],md=[],yd=[];
  d.p.forEach(function(p,i){
    var rv=d.r[i]; if(rv==null) return;
    labs.push(p);
    bd.push(cv(rv,p));
    md.push(d.mom[i]);
    yd.push(d.yoy[i]!=null&&d.yoy[i]>-99?d.yoy[i]:null);
  });

  var datasets=[
    {type:'bar',label:'Revenue',data:bd,backgroundColor:barClr+'88',borderColor:barClr,borderWidth:1,borderRadius:3,yAxisID:'y',order:2,barPercentage:0.7,categoryPercentage:0.85},
    {type:'line',label:'MoM%',data:md,borderColor:'#ab47bc',backgroundColor:'transparent',borderWidth:1.3,pointRadius:0,pointHoverRadius:3,yAxisID:'y1',tension:.35,order:1},
    {type:'line',label:'YoY%',data:yd,borderColor:'#ffa726',backgroundColor:'transparent',borderWidth:1.3,pointRadius:0,pointHoverRadius:3,yAxisID:'y1',tension:.35,order:0,borderDash:[4,3]}
  ];

  charts[id]=new Chart(el,{
    type:'bar',
    data:{labels:labs,datasets:datasets},
    options:{
      responsive:true,maintainAspectRatio:false,
      animation:{duration:200},
      plugins:{
        legend:{display:true,position:'top',labels:{boxWidth:7,padding:5,font:{size:8},color:'#6a6a9a',usePointStyle:true}},
        tooltip:{callbacks:{label:function(ctx){
          if(ctx.datasetIndex===0) return 'Revenue: '+fc(ctx.parsed.y);
          return ctx.dataset.label+': '+(ctx.parsed.y!=null?ctx.parsed.y.toFixed(1)+'%':'-');
        }}},
        datalabels:{display:false}
      },
      scales:{
        x:{grid:{display:false},ticks:{maxRotation:0,autoSkip:true,maxTicksLimit:7,font:{size:7},color:'#6a6a9a'}},
        y:{position:'left',grid:{color:'#1c1c38',lineWidth:.5},border:{display:false},ticks:{font:{size:7},color:'#6a6a9a',maxTicksLimit:5,callback:fa}},
        y1:{position:'right',grid:{display:false},border:{display:false},ticks:{font:{size:7},color:'#6a6a9a',maxTicksLimit:4,callback:function(v){return v+'%';}}}
      },
      interaction:{intersect:false,mode:'index'}
    }
  });
}

function mkYr(id,d,idx){
  var el=document.getElementById(id);
  if(!el||!d) return;
  var years={};
  d.p.forEach(function(p,i){
    var yoy=d.yoy[i];
    if(yoy==null||yoy<=-99) return;
    var parts=p.split('/');
    var yr=parts[0],mo=parseInt(parts[1]);
    if(!years[yr]) years[yr]=[];
    years[yr].push({mo:mo,v:yoy});
  });
  var months=['01','02','03','04','05','06','07','08','09','10','11','12'];
  var yrs=Object.keys(years).sort();
  var datasets=yrs.map(function(yr){
    return {
      label:"'"+yr,
      data:months.map(function(m){var f=years[yr].find(function(x){return x.mo===parseInt(m);});return f?f.v:null;}),
      borderColor:YR_CL[yr]||'#6a6a9a',backgroundColor:'transparent',
      borderWidth:1.4,pointRadius:1.5,pointHoverRadius:3,tension:.3,spanGaps:true
    };
  });

  var hasDL=typeof ChartDataLabels!=='undefined';
  charts[id]=new Chart(el,{
    type:'line',
    data:{labels:months.map(function(m){return m+'M';}),datasets:datasets},
    options:{
      responsive:true,maintainAspectRatio:false,animation:{duration:150},
      plugins:{
        legend:{display:true,position:'top',labels:{boxWidth:6,padding:4,font:{size:7},color:'#6a6a9a',usePointStyle:true}},
        tooltip:{callbacks:{label:function(ctx){return ctx.dataset.label+': '+ctx.parsed.y.toFixed(1)+'%';}}},
        datalabels:hasDL?{
          display:function(ctx){return ctx.datasetIndex===datasets.length-1;},
          color:'#e8e8f4',font:{size:6,weight:'bold'},
          formatter:function(v){return v!=null?v.toFixed(0)+'%':'';},
          anchor:'end',align:'top',offset:1
        }:{display:false}
      },
      scales:{
        x:{grid:{display:false},ticks:{font:{size:7},color:'#6a6a9a'}},
        y:{grid:{color:'#1c1c38',lineWidth:.5},border:{display:false},ticks:{font:{size:7},color:'#6a6a9a',maxTicksLimit:4,callback:function(v){return v+'%';}}}
      },
      interaction:{intersect:false,mode:'index'}
    },
    plugins:hasDL?[ChartDataLabels]:[]
  });
}

if(typeof Chart!=='undefined'){chartLoaded=true;init();}
